<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Website Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html">Beranda</a>
        <a href="tentang.html">Tentang</a>
        <a href="kontak.html">Kontak</a>
    </nav>

    <div class="container">
        <h1>Hubungi Saya</h1>
        <form id="whatsapp-form">
            <label>Nama:</label><br>
            <input type="text" id="nama" name="nama" required style="width: 100%; padding: 8px; margin: 10px 0;">
            
            <label>Pesan:</label><br>
            <textarea id="pesan" name="pesan" rows="4" required style="width: 100%; padding: 8px; margin: 10px 0;"></textarea>
            
            <button type="button" onclick="kirimKeWhatsApp()">Kirim via WhatsApp</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Profil Saya. Dibuat dengan Acode.</p>
    </footer>

    <script>
        function kirimKeWhatsApp() {
            var nomor = "6289512824137"; 
            var nama = document.getElementById("nama").value;
            var pesan = document.getElementById("pesan").value;
            
            if(nama === "" || pesan === "") {
                alert("Mohon isi nama dan pesan Anda!");
                return;
            }

            var url = "https://wa.me/" + nomor + "?text=" + 
                      "Halo, saya " + encodeURIComponent(nama) + ". " + 
                      "Pesan saya: " + encodeURIComponent(pesan);
                      
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
